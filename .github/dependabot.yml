# Keep the GitHub Actions we depend on (checkout, buildx, login, cosign…) current.
# Image base + pgvector versions are handled by check-upstream.yml, not here.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
