name: build-and-publish

# Build the postgres+pgvector images for every PG major, multi-arch, and publish
# to GHCR. Flow per major:
#   build (native amd64 + native arm64, in parallel)
#     -> load image locally -> smoke-test -> push BY DIGEST (no tag yet)
#   merge: assemble the multi-arch manifest list and apply the real tags,
#          then cosign-sign + SBOM-attest the final image.
# Nothing receives a pullable tag unless BOTH arches pass smoke. No smoke = no push.

on:
  push:
    branches: [main]
    tags: ['v*.*.*.*']
    # Doc/example-only changes must not trigger a republish (which mints new
    # digests and re-clutters the package). Builds fire on manifest/Dockerfile/
    # script/workflow changes — i.e. anything that affects the actual images.
    paths-ignore:
      - '**.md'
      - 'examples/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write       # push to GHCR
  id-token: write       # cosign keyless (Sigstore OIDC)
  attestations: write

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/jonathanmcohen/pgvector (lowercase)

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version facts once: pgvector version + which major owns :latest
  # (from manifest.json), and the current PG patch per major (from Docker Hub).
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      majors: ${{ steps.facts.outputs.majors }}
      pgvector: ${{ steps.facts.outputs.pgvector }}
      latest_target: ${{ steps.facts.outputs.latest_target }}
      patches: ${{ steps.facts.outputs.patches }}
    steps:
      - uses: actions/checkout@v7
      - id: facts
        run: |
          set -euo pipefail
          majors="$(jq -c '.pg_majors' manifest.json)"
          pgvector="$(jq -r '.pgvector' manifest.json)"
          latest_target="$(jq -r '.latest_alias_target' manifest.json)"
          # Resolve the newest patch the bare <major> tag points at.
          patches='{}'
          for m in $(jq -r '.pg_majors[]' manifest.json); do
            p="$(curl -fsSL "https://hub.docker.com/v2/repositories/library/postgres/tags?page_size=100&name=${m}." \
              | jq -r '.results[].name' | grep -E "^${m}\.[0-9]+$" | sort -t. -k2,2n | tail -1)"
            [ -n "$p" ] || { echo "could not resolve patch for PG ${m}" >&2; exit 1; }
            patches="$(jq -c --arg m "$m" --arg p "$p" '.[$m]=$p' <<<"$patches")"
          done
          {
            echo "majors=${majors}"
            echo "pgvector=${pgvector}"
            echo "latest_target=${latest_target}"
            echo "patches=${patches}"
          } >> "$GITHUB_OUTPUT"
          echo "pgvector=${pgvector} latest=${latest_target} patches=${patches}"

  # ---------------------------------------------------------------------------
  # Build + smoke each (major x arch) on a NATIVE runner (no qemu), then push the
  # arch image by digest. The digest is uploaded for the merge job to assemble.
  # ---------------------------------------------------------------------------
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        major: ${{ fromJSON(needs.prepare.outputs.majors) }}
        arch:
          - { runner: ubuntu-latest,     platform: linux/amd64, suffix: amd64 }
          - { runner: ubuntu-24.04-arm,  platform: linux/arm64, suffix: arm64 }
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1) Build for THIS arch and load into the local docker so we can run it.
      - name: Build (load, single-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: variants/${{ matrix.major }}/Dockerfile
          platforms: ${{ matrix.arch.platform }}
          build-args: |
            PGVECTOR_VERSION=${{ needs.prepare.outputs.pgvector }}
          load: true
          tags: pgvector-build:${{ matrix.major }}-${{ matrix.arch.suffix }}
          cache-from: type=gha,scope=${{ matrix.major }}-${{ matrix.arch.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.major }}-${{ matrix.arch.suffix }}

      # 2) Smoke-test the just-built image. Failure aborts -> no push, no tag.
      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh pgvector-build:${{ matrix.major }}-${{ matrix.arch.suffix }}

      # 2b) Trivy CVE gate (E2): fail on fixable HIGH/CRITICAL in the OS (apk)
      #     packages — the surface we control (a new base digest fixes them, and
      #     check-upstream picks that up). Go-stdlib CVEs in the base image's
      #     gosu binary are NOT gated: we can't rebuild gosu (the postgres image
      #     owns its Go version), so blocking on them would wedge every publish.
      #     They're surfaced by the informational report below instead.
      - name: Trivy gate (fail on fixable OS HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pgvector-build:${{ matrix.major }}-${{ matrix.arch.suffix }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os
          exit-code: '1'
          format: table

      - name: Trivy full report (informational, non-blocking)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pgvector-build:${{ matrix.major }}-${{ matrix.arch.suffix }}
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: table

      # 3) Re-export the same build, this time pushed BY DIGEST (cache hit).
      - name: Push by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: variants/${{ matrix.major }}/Dockerfile
          platforms: ${{ matrix.arch.platform }}
          build-args: |
            PGVECTOR_VERSION=${{ needs.prepare.outputs.pgvector }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.major }}-${{ matrix.arch.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.major }}-${{ matrix.arch.suffix }}

      - name: Record digest
        run: |
          mkdir -p digests
          echo "${{ steps.push.outputs.digest }}" > "digests/${{ matrix.major }}-${{ matrix.arch.suffix }}"

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.major }}-${{ matrix.arch.suffix }}
          path: digests/${{ matrix.major }}-${{ matrix.arch.suffix }}
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Assemble the multi-arch manifest list per major, apply all tags, sign + SBOM.
  # ---------------------------------------------------------------------------
  merge:
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix:
        major: ${{ fromJSON(needs.prepare.outputs.majors) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-${{ matrix.major }}-*
          path: digests
          merge-multiple: true

      - name: Create manifest list with tags
        id: manifest
        env:
          PATCHES: ${{ needs.prepare.outputs.patches }}
        run: |
          set -euo pipefail
          PGVECTOR='${{ needs.prepare.outputs.pgvector }}'
          LATEST_TARGET='${{ needs.prepare.outputs.latest_target }}'
          MAJOR='${{ matrix.major }}'
          # Resolve via jq (GH expression numeric-index into a string-keyed map is unreliable).
          PATCH="$(jq -r --arg m "$MAJOR" '.[$m]' <<<"$PATCHES")"
          [ -n "$PATCH" ] && [ "$PATCH" != "null" ] || { echo "no patch for PG $MAJOR" >&2; exit 1; }

          # Tag set (per spec): moving, pinned, fully-pinned, + latest alias.
          tags=(
            "${IMAGE}:${MAJOR}"
            "${IMAGE}:${MAJOR}-${PGVECTOR}"
            "${IMAGE}:${PATCH}-${PGVECTOR}"
          )
          if [ "${MAJOR}" = "${LATEST_TARGET}" ]; then
            tags+=("${IMAGE}:latest")
          fi

          # Per-arch digest refs collected from the build job.
          refs=()
          for f in digests/*; do
            d="$(cat "$f")"
            refs+=("${IMAGE}@${d}")
          done
          [ "${#refs[@]}" -ge 2 ] || { echo "expected >=2 arch digests, got ${#refs[@]}" >&2; exit 1; }

          targs=()
          for t in "${tags[@]}"; do targs+=("-t" "$t"); done
          echo "creating: ${tags[*]}"
          docker buildx imagetools create "${targs[@]}" "${refs[@]}"

          # Resolve the final multi-arch manifest digest for signing/attestation.
          digest="$(docker buildx imagetools inspect "${IMAGE}:${MAJOR}-${PGVECTOR}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "primary=${IMAGE}:${MAJOR}-${PGVECTOR}" >> "$GITHUB_OUTPUT"
          echo "published ${IMAGE}:${MAJOR}-${PGVECTOR} @ ${digest}"

      - uses: sigstore/cosign-installer@v3

      - name: Cosign sign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          # Sign the multi-arch index only (NOT --recursive): verifying the index
          # signature is sufficient and avoids a separate .sig per arch child,
          # which otherwise triples the artifact count on the package page.
          cosign sign "${IMAGE}@${{ steps.manifest.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.manifest.outputs.primary }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        env:
          COSIGN_YES: "true"
        run: |
          # NB: cosign attest has no --recursive flag (only cosign sign does);
          # the predicate attaches to the manifest-list digest.
          cosign attest \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE}@${{ steps.manifest.outputs.digest }}"

      - name: Summary
        run: |
          {
            echo "### Published PG ${{ matrix.major }}"
            echo ""
            echo "- digest: \`${{ steps.manifest.outputs.digest }}\`"
            echo "- pgvector: \`${{ needs.prepare.outputs.pgvector }}\`"
            docker buildx imagetools inspect "${IMAGE}:${{ matrix.major }}-${{ needs.prepare.outputs.pgvector }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Auto-release: once all majors are published, cut a dated git tag + GitHub
  # Release recording this version. Runs only on main, only when the triggering
  # commit changed manifest.json (i.e. an actual version bump — not doc pushes),
  # and is idempotent (a same-day re-bump gets a .N suffix). This is what makes
  # the pipeline self-tagging end to end: a bump merge publishes AND releases.
  # ---------------------------------------------------------------------------
  release:
    needs: [prepare, merge]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the tag + create the Release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0     # full history for the changelog

      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PGVECTOR: ${{ needs.prepare.outputs.pgvector }}
        run: |
          set -euo pipefail

          # Only release on an actual version change. A bump merge touches
          # manifest.json; doc-only pushes and re-dispatches do not.
          if git rev-parse -q --verify HEAD~1 >/dev/null 2>&1; then
            if ! git diff --name-only HEAD~1 HEAD | grep -qx 'manifest.json'; then
              echo "manifest.json unchanged in this commit — no release"
              exit 0
            fi
          fi

          DATE="$(date -u +%Y.%m.%d)"
          BASE="${DATE}-pgvector${PGVECTOR}"
          TAG="$BASE"
          n=1
          # Idempotent + collision-safe: reached only on a real bump, so a
          # second same-day bump (e.g. alpine-only) gets BASE.1, BASE.2, ...
          while git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1 \
                || gh release view "$TAG" >/dev/null 2>&1; do
            TAG="${BASE}.${n}"; n=$((n+1))
          done

          # NB: don't pre-push the tag then `gh release create` it — there's a
          # race where GitHub hasn't indexed the fresh tag yet and creation
          # fails transiently. Let gh create the tag at this commit atomically
          # (see `--target` below), so there's exactly one operation.

          # Changelog since the previous release tag (if any), grouped by
          # conventional-commit type (release-drafter-style, E6).
          PREV="$(git tag --list '*-pgvector*' --sort=-creatordate | grep -vx "$TAG" | head -1 || true)"
          RANGE=""
          [ -n "$PREV" ] && RANGE="${PREV}..HEAD"
          log_subjects() {
            if [ -n "$RANGE" ]; then git log --no-merges --pretty='%s|%h' "$RANGE"
            else git log --no-merges --pretty='%s|%h'; fi
          }
          section() { # $1=heading  $2=grep-extended-regex
            local body
            body="$(log_subjects | grep -iE "$2" | sed -E 's/^([^|]*)\|(.*)$/- \1 (\2)/' | head -30 || true)"
            [ -n "$body" ] && { echo "#### $1"; echo "$body"; echo; }
          }

          {
            echo "Automated release — pgvector **${PGVECTOR}** on Postgres $(jq -r '.pg_majors | join(", ")' manifest.json) (Alpine)."
            echo
            echo "### Images"
            for m in $(jq -r '.pg_majors[]' manifest.json); do
              echo "- \`${IMAGE}:${m}-${PGVECTOR}\` (also \`:${m}\` moving)"
            done
            echo
            echo "### Changes"
            section "⬆️ Upstream bumps" '^chore(\(.*\))?: bump'
            section "✨ Features"        '^feat(\(.*\))?:'
            section "🐛 Fixes"           '^fix(\(.*\))?:'
            section "🔧 CI / build"      '^ci(\(.*\))?:'
            section "📝 Docs"            '^docs(\(.*\))?:'
            # Anything not matching a known prefix.
            other="$(log_subjects | grep -ivE '^(chore(\(.*\))?: bump|feat|fix|ci|docs)(\(.*\))?:' \
                     | sed -E 's/^([^|]*)\|(.*)$/- \1 (\2)/' | head -30 || true)"
            [ -n "$other" ] && { echo "#### Other"; echo "$other"; echo; }
            echo "### manifest.json"
            echo '```json'
            cat manifest.json
            echo '```'
          } > notes.md

          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file notes.md
          echo "released ${TAG}"
          echo "### Released \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Failure notification: this workflow mostly runs unattended (dispatched by
  # the nightly check-upstream), so a red run must page a human. Without this,
  # gate failures went unnoticed for days. Skips if an identical open issue
  # already exists (a stuck upstream CVE fails nightly until fixed).
  # ---------------------------------------------------------------------------
  notify-failure:
    needs: [prepare, build, merge, release]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open issue (dedup by title)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="build-and-publish failed on ${GITHUB_REF_NAME}"
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title \"$title\"" --json number --jq 'length')"
          if [ "$existing" -gt 0 ]; then
            echo "open failure issue already exists — not duplicating"
            exit 0
          fi
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$title" \
            --label automated \
            --body "A build-and-publish run failed (build, smoke, Trivy gate, merge, or release). Logs: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          cc @jonathanmcohen"
